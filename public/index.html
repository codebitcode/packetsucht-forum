<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Packetsucht Forum</title>
</head>
<body>

<h1>📦 Packetsucht Forum</h1>

<a href="/login.html">Login</a> |
<a href="/register.html">Register</a>

<h2>Neuen Thread erstellen</h2>

<input id="titleInput" type="text" placeholder="Titel eingeben">
<button onclick="createThread()">Absenden</button>

<h2>Threads</h2>

<div id="threads"></div>

<script>
async function loadThreads() {
  const res = await fetch('/api/threads');
  const data = await res.json();

  const container = document.getElementById('threads');
  container.innerHTML = '';

  data.forEach(t => {
    const el = document.createElement('div');
    el.innerHTML = `<a href="/thread.html?id=${t.id}">${t.title}</a>`;
    container.appendChild(el);
  });
}

async function createThread() {
  const title = document.getElementById('titleInput').value;

  if (!title) return;

  await fetch('/api/threads', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      title: title,
      user_id: 1
    })
  });

  document.getElementById('titleInput').value = '';
  loadThreads();
}

loadThreads();
</script>

</body>
</html>
