<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Packetsucht Forum</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <h1>📦 Packetsucht Forum</h1>

  <div id="auth"></div>

  <h2>Neuen Thread erstellen</h2>

  <input id="titleInput" type="text" placeholder="Titel eingeben">
  <button onclick="createThread()">Absenden</button>

  <h2>Threads</h2>

  <div id="threads"></div>



  <script>

    async function loadThreads() {
      const res = await fetch('/api/threads');
      const data = await res.json();

      const container = document.getElementById('threads');
      container.innerHTML = '';

      data.forEach(t => {
        const el = document.createElement('div');
        el.className = 'thread';
        el.innerHTML = `<a href="/thread.html?id=${t.id}">${t.title}</a>`;
        container.appendChild(el);
      });
    }

    async function createThread() {
      const title = document.getElementById('titleInput').value.trim();

      if (!title) return;

      const res = await fetch('/api/threads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: title
        })
      });

      if (!res.ok) {
        alert(await res.text());
        return;
      }

      document.getElementById('titleInput').value = '';
      loadThreads();
    }

    async function checkLogin() {
      const res = await fetch('/api/me');
      const data = await res.json();

      const el = document.getElementById('auth');

      if (data.loggedIn) {
        el.innerHTML = `
      ${data.user.username} |
      <a href="#" onclick="logout(); return false;">Logout</a>
    `;
      } else {
        el.innerHTML = `
      <a href="/login.html">Login</a> |
      <a href="/register.html">Register</a>
    `;
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      location.reload();
    }

    (async () => {
      await loadThreads();
      await checkLogin();

      setInterval(async () => {
        await loadThreads();
      }, 5000);
    })();
  </script>

</body>

</html>
