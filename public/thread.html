<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paketsucht</title>
  <link rel="icon" type="image/png" href="/Bilder/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="container">
    <h1>📦 Thread</h1>
    <a href="/index.html">← Zurück</a>

    <h2 id="threadTitle">Lade...</h2>

    <div id="posts"></div>
    <div id="error"></div>
    <h3>Antwort schreiben</h3>
    <form id="postForm">
      <textarea id="content" rows="5" cols="50"></textarea> <br><br>
      <button type="submit">Posten</button>
      <input type="file" id="fileInput" accept="image/*">
      <br><br>
    </form>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const threadId = urlParams.get('id');
    let isPosting = false;

    async function loadThread() {
      const res = await fetch('/api/threads');
      const threads = await res.json();

      const thread = threads.find(t => String(t.id) === String(threadId));
      document.getElementById('threadTitle').textContent = thread ? thread.title : 'Thread nicht gefunden';
    }

    async function checkLogin() {
      const res = await fetch('/api/me');
      const data = await res.json();

      if (!data.loggedIn) {
        document.getElementById('postForm').style.display = 'none';
        document.getElementById('error').innerText = 'Bitte einloggen';
      }
    }

    async function loadPosts() {
      const res = await fetch('/api/posts?thread_id=' + Number(threadId));
      const data = await res.json();

      const container = document.getElementById('posts');
      container.innerHTML = '';

      data.forEach(p => {
        const el = document.createElement('div');
        el.style.marginBottom = '12px';

        const name = document.createElement('b');
        name.textContent = p.username + ':';

        const text = document.createElement('div');
        text.textContent = p.content || '';

        el.appendChild(name);
        el.appendChild(document.createElement('br'));
        el.appendChild(text);

        if (p.image) {
          if (p.status === "approved") {
            const img = document.createElement('img');
            img.src = '/api/image/' + encodeURIComponent(p.image);
            img.className = 'post-image';
            el.appendChild(img);
          } else if (p.status === "pending") {
            const box = document.createElement('div');
            box.textContent = 'PENDING';
            box.className = 'box pending';
            el.appendChild(box);
          } else if (p.status === "rejected") {
            const box = document.createElement('div');
            box.textContent = 'ABGELEHNT';
            box.className = 'box rejected';
            el.appendChild(box);
          }
        }

        container.appendChild(el);
      });
    }



    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (isPosting) return;
      isPosting = true;

      const submitBtn = document.querySelector('#postForm button[type="submit"]');
      if (submitBtn) submitBtn.disabled = true;

      try {
        const content = document.getElementById('content').value.trim();
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];

        if (!content && !file) return;

        document.getElementById('error').innerText = '';

        let uploadedFile = null;

        if (file) {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('thread_id', threadId);

          const uploadRes = await fetch('/api/upload', {
            method: 'POST',
            body: formData
          });

          const uploadText = await uploadRes.text();
          console.log('POST /api/upload:', uploadRes.status, uploadText);

          if (!uploadRes.ok) {
            document.getElementById('error').innerText = uploadText;
            return;
          }

          const uploadData = JSON.parse(uploadText);
          uploadedFile = uploadData.filename;
        }

        const res = await fetch('/api/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            thread_id: Number(threadId),
            content: content,
            image: uploadedFile
          })
        });

        const text = await res.text();
        console.log('POST /api/posts:', res.status, text);

        if (!res.ok) {
          document.getElementById('error').innerText = text;
          return;
        }

        document.getElementById('content').value = '';
        fileInput.value = '';
        await loadPosts();
      } finally {
        isPosting = false;
        if (submitBtn) submitBtn.disabled = false;
      }
    });

    (async () => {
      await loadThread();
      await loadPosts();
      await checkLogin();

      fetch("/api/track-page", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          path: location.host + location.pathname + location.search
        })
      }).catch(() => { });

      setInterval(async () => {
        await loadPosts();
      }, 5000);
    })();

  </script>

</body>

</html>
