<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Thread</title>
</head>
<body>

<h1>📦 Thread</h1>
<a href="/index.html">← Zurück</a>

<h2 id="threadTitle">Lade...</h2>

<div id="posts"></div>

<h3>Antwort schreiben</h3>
<form id="postForm">
  <textarea id="content" required rows="5" cols="50"></textarea>
  <br><br>
  <button type="submit">Posten</button>
</form>

<script>
const urlParams = new URLSearchParams(window.location.search);
const threadId = urlParams.get('id');

async function loadThread() {
  const res = await fetch('/api/threads');
  const threads = await res.json();

  const thread = threads.find(t => String(t.id) === String(threadId));
  document.getElementById('threadTitle').textContent = thread ? thread.title : 'Thread nicht gefunden';
}

async function loadPosts() {
  const res = await fetch('/api/posts?thread_id=' + threadId);
  const data = await res.json();

  const container = document.getElementById('posts');
  container.innerHTML = '';

  data.forEach(p => {
    const el = document.createElement('div');
    el.style.marginBottom = '12px';
    el.innerHTML = `<b>User ${p.user_id || 1}:</b><br>${p.content}`;
    container.appendChild(el);
  });
}

document.getElementById('postForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const content = document.getElementById('content').value.trim();
  if (!content) return;

  const res = await fetch('/api/posts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      thread_id: Number(threadId),
      user_id: 1,
      content: content
    })
  });

  const text = await res.text();
  console.log('POST /api/posts:', res.status, text);

  if (!res.ok) {
    alert('Fehler: ' + text);
    return;
  }

  document.getElementById('content').value = '';
  await loadPosts();
});

  document.getElementById('content').value = '';
  loadPosts();
});

loadThread();
loadPosts();
</script>

</body>
</html>
