<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <link rel="icon" type="image/png" href="/Bilder/favicon.png">
</head>

<body>
  <div id="status"></div>
  <h1>🛠 Admin – Bilder prüfen</h1>

  <h2>Offen</h2>
  <div id="pendingImages"></div>

  <h2>Abgelehnt</h2>
  <div id="rejectedImages"></div>

  <h1>🛠 Admin – Threads prüfen</h1>

  <h2>Neue Threads</h2>
  <div id="threads"></div>




  <script>
    let openThreadId = null;
    async function checkAdmin() {
      const res = await fetch('/api/me');
      const data = await res.json();


      if (!data.loggedIn || !data.isAdmin) {
        document.getElementById('status').innerText = 'Kein Zugriff';
        return false;
      }

      document.getElementById('status').innerText = 'Admin: ' + data.user.username;
      return true;
    }

    function renderImage(container, img, type) {
      const el = document.createElement('div');
      el.style.marginBottom = '30px';
      el.style.padding = '10px';
      el.style.border = '1px solid #ccc';

      let buttons = '';

      if (type === 'pending') {
        buttons = `
      <button onclick="approve(${img.id})">Freigeben</button>
      <button onclick="reject(${img.id})">Ablehnen</button>
    `;
      }

      if (type === 'rejected') {
        buttons = `
    <button onclick="deleteImage(${img.id})">Endgültig löschen</button>
  `;
      }

      el.innerHTML = `
  <img src="${img.image_url}" width="200"><br><br>
  Bild-ID: ${img.id}<br>
  Filename: ${img.filename}<br>
  User: ${img.user_id}<br>
  Thread: ${img.thread_id ?? '-'}<br>
  Status: ${img.status}<br><br>
  ${buttons}
`;

      container.appendChild(el);
    }

    async function loadImages() {
      const pendingRes = await fetch('/api/images?status=pending');
      const pendingData = await pendingRes.json();

      const rejectedRes = await fetch('/api/images?status=rejected');
      const rejectedData = await rejectedRes.json();

      const pendingContainer = document.getElementById('pendingImages');
      const rejectedContainer = document.getElementById('rejectedImages');

      pendingContainer.innerHTML = '';
      rejectedContainer.innerHTML = '';

      if (pendingData.length === 0) {
        pendingContainer.innerHTML = '<p>Keine offenen Bilder.</p>';
      } else {
        pendingData.forEach(img => renderImage(pendingContainer, img, 'pending'));
      }

      if (rejectedData.length === 0) {
        rejectedContainer.innerHTML = '<p>Keine abgelehnten Bilder.</p>';
      } else {
        rejectedData.forEach(img => renderImage(rejectedContainer, img, 'rejected'));
      }
    }





    async function loadThreads() {
      const res = await fetch('/api/threads');
      const data = await res.json();

      const container = document.getElementById('threads');
      container.innerHTML = '';

      for (const t of data) {
        const el = document.createElement('div');
        el.style.border = '1px solid #ccc';
        el.style.marginBottom = '10px';
        el.style.padding = '10px';

        let postsHtml = '';

        if (openThreadId === t.id) {
          const postsRes = await fetch('/api/posts?thread_id=' + Number(t.id));
          const posts = await postsRes.json();

          if (!posts.length) {
            postsHtml = `<div style="margin-top:10px;">Keine Posts vorhanden.</div>`;
          } else {
            postsHtml = `<div style="margin-top:10px;">`;

            posts.forEach(p => {
              let imageHtml = '';

              if (p.image) {
                if (p.status === 'approved') {
                  imageHtml = `<img src="/api/image/${encodeURIComponent(p.image)}" width="200"><br><br>`;
                } else if (p.status === 'pending') {
                  imageHtml = `<div style="width:200px;height:120px;background:#ccc;display:flex;align-items:center;justify-content:center;font-weight:bold;">PENDING</div><br>`;
                } else if (p.status === 'rejected') {
                  imageHtml = `<div style="width:200px;height:120px;background:#f5b5b5;display:flex;align-items:center;justify-content:center;font-weight:bold;">ABGELEHNT</div><br>`;
                }
              }

              postsHtml += `
            <div style="border-top:1px solid #ddd; margin-top:10px; padding-top:10px;">
              <b>${p.username}</b><br>
              Post-ID: ${p.id}<br>
              ${p.content ? 'Text: ' + p.content + '<br><br>' : ''}
              ${imageHtml}
              <button onclick="deletePost(${p.id})">Post löschen</button>
            </div>
          `;
            });

            postsHtml += `</div>`;
          }
        }

        el.innerHTML = `
      <b style="cursor:pointer;" onclick="toggleThread(${t.id})">${t.title}</b><br>
      Thread-ID: ${t.id}<br><br>
      <button onclick="toggleThread(${t.id})">${openThreadId === t.id ? 'Zuklappen' : 'Posts anzeigen'}</button>
      <button onclick="deleteThread(${t.id})">Thread löschen</button>
      ${postsHtml}
    `;

        container.appendChild(el);
      }
    }




    async function toggleThread(id) {
      if (openThreadId === id) {
        openThreadId = null;
      } else {
        openThreadId = id;
      }

      await loadThreads();
    }


    async function deletePost(id) {
      const ok = confirm('Post wirklich löschen?');
      if (!ok) return;

      await fetch('/api/posts/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });

      await loadThreads();
      await loadImages();
    }

    async function approve(id) {
      await fetch('/api/images/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });

      await loadImages();
      await loadThreads();
    }
    async function deleteThread(id) {
      const ok = confirm('Thread wirklich löschen?');
      if (!ok) return;

      await fetch('/api/threads/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });

      await loadThreads();
      await loadImages();
    }

    async function reject(id) {
      const ok = confirm('Bild wirklich ablehnen? Der Post wird gelöscht.');
      if (!ok) return;

      await fetch('/api/images/reject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });

      await loadImages();
      await loadThreads();
    }

    async function deleteImage(id) {
      const ok = confirm('Bild wirklich endgültig löschen?');
      if (!ok) return;

      await fetch('/api/images/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });

      await loadImages();
      await loadThreads();
    }

    (async () => {
      const ok = await checkAdmin();
      if (!ok) return;

      await loadImages();
      await loadThreads();

      setInterval(async () => {
        await loadImages();
        await loadThreads();
      }, 3600000);
    })();

    fetch("/api/track-page", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        path: location.host + location.pathname + location.search
      })
    }).catch(() => { });
  </script>

</body>

</html>
